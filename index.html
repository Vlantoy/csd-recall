<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ứng dụng ôn tập theo môn với thẻ học và lặp lại ngắt quãng từ các file slide HTML.">
  <title>CSD Recall</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#studyCard">Đi tới thẻ học</a>

  <header class="app-header">
    <div class="header-inner">
      <a class="brand" href="./" aria-label="CSD Recall - trang học">
        <span class="brand-mark" aria-hidden="true">C</span>
        <span>CSD Recall</span>
      </a>
      <p class="header-summary" id="headerSummary">Đang tải bộ thẻ...</p>
      <button class="icon-text-button" type="button" id="resetProgress" title="Đặt lại toàn bộ tiến độ">
        <span aria-hidden="true">↺</span>
        <span>Đặt lại</span>
      </button>
    </div>
  </header>

  <main class="page-shell">
    <section class="set-overview" aria-labelledby="overviewTitle">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Bộ môn của bạn</p>
          <h1 id="overviewTitle">Hôm nay học gì?</h1>
        </div>
        <p id="overallProgress" class="overall-progress">0 thẻ còn lại</p>
      </div>
      <div class="subject-list" id="subjectList"></div>
    </section>

    <section class="study-workspace" aria-labelledby="studyTitle">
      <div class="study-heading">
        <div>
          <p class="section-kicker" id="courseEyebrow">MKT101</p>
          <h2 id="studyTitle">Marketing căn bản</h2>
        </div>
        <label class="slide-jump">
          <span>Đi tới thẻ</span>
          <input id="slideSearch" type="number" min="1" inputmode="numeric" aria-label="Nhập số thẻ">
        </label>
      </div>

      <nav class="mode-tabs" role="tablist" aria-label="Chế độ học">
        <button class="mode-button" type="button" role="tab" data-mode="review">Ôn đến hạn</button>
        <button class="mode-button is-active" type="button" role="tab" data-mode="learn">Học mới</button>
        <button class="mode-button" type="button" role="tab" data-mode="browse">Duyệt tất cả</button>
      </nav>

      <div class="session-progress" aria-label="Tiến độ trong môn hiện tại">
        <div class="session-progress-copy">
          <span id="cardPosition">Thẻ 1 / 1</span>
          <span id="statusBadge">Chưa học</span>
        </div>
        <div class="session-track" aria-hidden="true">
          <span class="session-fill" id="sessionFill"></span>
        </div>
      </div>

      <article class="flashcard" id="studyCard" aria-live="polite">
        <div class="flashcard-surface" id="slideSurface" role="img" aria-label="Ảnh slide câu hỏi">
          <span class="card-face card-front" id="cardFront">
            <span class="frame-loading" id="frameLoading">Đang tải slide...</span>
            <span class="slide-canvas" id="slideCanvas" role="img" aria-label="Ảnh slide câu hỏi"></span>
          </span>
        </div>
      </article>

      <div class="study-heatmap" id="studyHeatmap" aria-label="Heatmap tiến độ của môn hiện tại"></div>

      <section class="answer-panel" aria-labelledby="answerPanelTitle">
        <div class="answer-panel-top">
          <div>
            <p class="section-kicker">Đáp án của bạn</p>
            <h3 id="answerPanelTitle">Chọn A-E</h3>
          </div>
          <p class="answer-feedback" id="answerFeedback" aria-live="polite">Chưa chọn</p>
        </div>
        <div class="answer-choice-list" id="answerChoices" role="group" aria-label="Chọn đáp án A đến E"></div>
        <button class="answer-check-button" type="button" id="answerCheck">Kiểm tra</button>
        <div class="answer-explanation is-hidden" id="answerExplanation" aria-live="polite"></div>
      </section>

      <div class="navigation-controls" aria-label="Điều khiển thẻ">
        <button class="round-button" type="button" id="prevCard" aria-label="Thẻ trước" title="Thẻ trước (mũi tên trái)">‹</button>
        <button class="round-button" type="button" id="nextCard" aria-label="Thẻ sau" title="Thẻ sau (mũi tên phải)">›</button>
      </div>
    </section>

    <section class="queue-section" aria-labelledby="queueTitle">
      <div class="section-heading queue-heading">
        <div>
          <p class="section-kicker">Lặp lại ngắt quãng</p>
          <h2 id="queueTitle">Sắp tới cần ôn</h2>
        </div>
        <p id="queueSummary" class="overall-progress">0 thẻ</p>
      </div>
      <div class="queue-list" id="queueList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
